# ========================================
# Upstream with Connection Pooling
# keepalive 复用连接，减少 TCP 握手开销
# ========================================
upstream backend {
    server 127.0.0.1:8000;
    keepalive 32;
    keepalive_timeout 60s;
}

# ========================================
# Gzip Compression
# ========================================
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 4;
gzip_min_length 256;
gzip_types
    application/json
    application/javascript
    application/x-javascript
    text/javascript
    text/css
    text/plain
    text/xml
    application/xml
    image/svg+xml
    font/woff2
    application/manifest+json;

# ========================================
# Health check
# ========================================
location = /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
}

# ========================================
# WebSocket (WSS) - 实时双向通信
# ========================================
location /ws {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    # WebSocket 协议升级
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # 长连接超时
    proxy_read_timeout 86400s;
    proxy_send_timeout 86400s;
}

# ========================================
# SSE Stream - 实时聊天 (关键路径)
# 必须禁用所有缓冲
# ========================================
location ~ ^/api/chat/sessions/[^/]+/stream$ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;

    proxy_buffering off;
    proxy_cache off;
    chunked_transfer_encoding on;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';

    # 超时：允许长时间对话运行，后端心跳和流式数据会持续刷新读超时
    proxy_read_timeout 86400s;
    proxy_send_timeout 30s;
    add_header X-Accel-Buffering "no" always;
}

# ========================================
# Chat API - 需要较长超时
# ========================================
location /api/chat/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_read_timeout 3600s;
}

# ========================================
# Human approval (agent callbacks)
# ========================================
location /human/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
}

# ========================================
# Auth API
# ========================================
location /api/auth/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_read_timeout 30s;
}

# ========================================
# Upload API - 需要较大 body size
# ========================================
location /api/upload/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    client_max_body_size 100M;
    proxy_connect_timeout 10s;
    proxy_read_timeout 3600s;

    # Disable buffering for video streaming (Range requests)
    proxy_buffering off;
    proxy_cache off;
}

# ========================================
# General API (admin, agents, users, sessions, skills, mcp, etc.)
# ========================================
location /api/ {
    proxy_pass http://127.0.0.1:8000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 3s;
    proxy_read_timeout 3600s;
}

# ========================================
# Static Assets (immutable, 长缓存)
# ========================================
location /assets/ {
    proxy_pass http://127.0.0.1:8000;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location /icons/ {
    proxy_pass http://127.0.0.1:8000;
    expires 1y;
    access_log off;
    add_header Cache-Control "public, max-age=31536000, immutable";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location /images/ {
    proxy_pass http://127.0.0.1:8000;
    expires 7d;
    access_log off;
    add_header Cache-Control "public, max-age=604800, stale-while-revalidate=86400";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location = /manifest.json {
    proxy_pass http://127.0.0.1:8000;
    expires -1;
    access_log off;
    add_header Cache-Control "no-cache";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

location = /sw.js {
    proxy_pass http://127.0.0.1:8000;
    expires -1;
    access_log off;
    add_header Cache-Control "no-cache";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header Connection "";
}

# ========================================
# SPA Fallback
# ========================================
location / {
    proxy_pass http://127.0.0.1:8000;
    add_header Cache-Control "no-cache";

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection "";

    proxy_connect_timeout 60s;
    proxy_read_timeout 3600s;
}
