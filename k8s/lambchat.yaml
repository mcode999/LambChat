---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: lambchat

---
# LambChat App Deployment
# Production multi-replica mode expects external or managed MongoDB, Redis, and
# S3-compatible object storage. Replace the placeholder values before applying.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lambchat
  namespace: lambchat
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lambchat
  template:
    metadata:
      labels:
        app: lambchat
    spec:
      containers:
      - name: lambchat
        image: ghcr.io/yanyutin753/lambchat:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: "8000"
        # --- Secrets ---
        - name: JWT_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: jwt-secret-key
        - name: MCP_ENCRYPTION_SALT
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mcp-encryption-salt
        # --- MongoDB ---
        - name: MONGODB_URL
          value: "mongodb://MONGO_HOST:27017"
        - name: MONGODB_DB
          value: "agent_state"
        - name: MONGODB_ENABLED
          value: "true"
        - name: MONGODB_USERNAME
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mongodb-username
        - name: MONGODB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: mongodb-password
        - name: MONGODB_AUTH_SOURCE
          value: "admin"
        # --- Redis ---
        - name: REDIS_URL
          value: "redis://REDIS_HOST:6379/3"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: redis-password
        - name: SESSION_BACKEND
          value: "redis"
        - name: TASK_BACKEND
          value: "arq"
        - name: ARQ_EMBEDDED_WORKER
          value: "true"
        # --- Object Storage (required for multi-replica deployments) ---
        - name: S3_ENABLED
          value: "true"
        - name: S3_PROVIDER
          value: "custom"
        - name: S3_ENDPOINT_URL
          value: "https://s3.example.com"
        - name: S3_BUCKET_NAME
          value: "lambchat-files"
        - name: S3_REGION
          value: "us-east-1"
        - name: S3_PATH_STYLE
          value: "false"
        - name: ENABLE_LOCAL_FILESYSTEM_FALLBACK
          value: "false"
        - name: S3_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: s3-access-key
        - name: S3_SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: lambchat-secrets
              key: s3-secret-key
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "4Gi"
            cpu: "2000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 120
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 60
          periodSeconds: 15
          timeoutSeconds: 10
          failureThreshold: 5
        volumeMounts:
        - name: workspace
          mountPath: /app/workspace
      volumes:
      - name: workspace
        emptyDir: {}

---
# LambChat Service
apiVersion: v1
kind: Service
metadata:
  name: lambchat
  namespace: lambchat
spec:
  type: NodePort
  selector:
    app: lambchat
  ports:
  - port: 80
    targetPort: 8000
    nodePort: 30080
