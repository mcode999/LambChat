<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LambChat README Hero</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      width: 1600px;
      height: 820px;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 18%, rgba(94, 168, 120, .16), transparent 31%),
        radial-gradient(circle at 83% 12%, rgba(130, 104, 168, .17), transparent 30%),
        linear-gradient(135deg, #f5faf7 0%, #f8fbfc 52%, #f5f2fb 100%);
      color: #14221b;
    }
    .stage {
      position: relative;
      width: 1600px;
      height: 820px;
      padding: 70px 86px;
    }
    .shell {
      position: relative;
      width: 100%;
      height: 100%;
      border: 1px solid rgba(30, 57, 43, .12);
      border-radius: 40px;
      background: rgba(255,255,255,.72);
      box-shadow: 0 34px 90px rgba(31, 44, 38, .16);
      overflow: hidden;
    }
    .copy {
      position: absolute;
      z-index: 4;
      left: 58px;
      top: 64px;
      width: 470px;
    }
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      height: 40px;
      padding: 0 16px;
      border-radius: 999px;
      background: #e8f4ec;
      color: #2c6946;
      font-size: 17px;
      font-weight: 750;
    }
    h1 {
      margin: 26px 0 0;
      font-size: 62px;
      line-height: 1;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 24px 0 0;
      color: #506359;
      font-size: 22px;
      line-height: 1.35;
      font-weight: 560;
    }
    .pills {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 32px;
    }
    .pill {
      padding: 13px 18px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #dce8e1;
      color: #34483c;
      font-size: 18px;
      font-weight: 720;
      box-shadow: 0 12px 26px rgba(31, 44, 38, .06);
    }
    .screens {
      position: absolute;
      inset: 0;
      z-index: 2;
    }
    .screen {
      position: absolute;
      border-radius: 26px;
      overflow: hidden;
      background: #fff;
      border: 1px solid rgba(35, 52, 43, .14);
      box-shadow: 0 28px 70px rgba(30, 43, 36, .22);
    }
    .screen::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.42);
      border-radius: inherit;
    }
    .screen img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .main {
      left: 600px;
      top: 78px;
      width: 770px;
      height: 482px;
    }
    .main img { object-position: center top; }
    .secondary {
      left: 778px;
      top: 498px;
      width: 416px;
      height: 260px;
      border-radius: 22px;
    }
    .tertiary {
      left: 1130px;
      top: 422px;
      width: 300px;
      height: 188px;
      border-radius: 20px;
    }
    .phone {
      left: 1282px;
      top: 210px;
      width: 174px;
      height: 352px;
      border-radius: 28px;
      box-shadow: 0 26px 64px rgba(30, 43, 36, .28);
    }
    .phone img { object-position: center top; }
    .chip-row {
      position: absolute;
      z-index: 5;
      left: 614px;
      bottom: 54px;
      display: flex;
      gap: 12px;
    }
    .chip {
      border-radius: 999px;
      background: rgba(255,255,255,.88);
      border: 1px solid rgba(220, 232, 225, .95);
      padding: 13px 17px;
      color: #34483c;
      font-size: 16px;
      font-weight: 780;
      box-shadow: 0 14px 32px rgba(31, 44, 38, .09);
    }
    .wash {
      position: absolute;
      z-index: 3;
      inset: 0;
      background: linear-gradient(90deg, rgba(250,253,251,.96) 0%, rgba(250,253,251,.76) 32%, rgba(250,253,251,0) 60%);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <main class="stage">
    <section class="shell">
      <div class="screens" aria-hidden="true">
        <figure class="screen main"><img src="../best-practice/chat-response.webp" alt=""></figure>
        <figure class="screen secondary"><img src="../best-practice/marketplace-page.webp" alt=""></figure>
        <figure class="screen tertiary"><img src="../best-practice/mcp-page.webp" alt=""></figure>
        <figure class="screen phone"><img src="../best-practice/mobile-view.webp" alt=""></figure>
      </div>
      <div class="wash"></div>
      <div class="copy">
        <div class="eyebrow">LambChat Agent Platform</div>
        <h1>Agents that actually do the work</h1>
        <p class="subtitle">Build, run, and share tool-using AI agents with MCP, skills, memory, model routing, and production-ready infrastructure.</p>
        <div class="pills">
          <div class="pill">Deep agent runtime</div>
          <div class="pill">MCP tools</div>
          <div class="pill">Skill marketplace</div>
          <div class="pill">Model routing</div>
        </div>
      </div>
      <div class="chip-row" aria-hidden="true">
        <div class="chip">Chat</div>
        <div class="chip">Files</div>
        <div class="chip">Skills</div>
        <div class="chip">MCP</div>
        <div class="chip">Memory</div>
      </div>
    </section>
  </main>
</body>
</html>
