name: App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update, for example v2.5.0-app. Ignored for tag pushes.'
        required: true
        type: string
      app_url:
        description: 'Public LambChat URL. Falls back to repo variable/secret LAMBCHAT_APP_URL.'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.1'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  LAMBCHAT_APP_URL: ${{ inputs.app_url || vars.LAMBCHAT_APP_URL || secrets.LAMBCHAT_APP_URL }}

jobs:
  desktop:
    name: Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            runner: ubuntu-latest
            bundles: appimage,deb,rpm
            artifact_slug: linux-x86_64
            arch: x86_64
          - label: Linux ARM64
            runner: ubuntu-24.04-arm
            bundles: appimage,deb,rpm
            artifact_slug: linux-arm64
            arch: arm64
          - label: Windows
            runner: windows-2022
            bundles: msi
            artifact_slug: windows
          - label: macOS
            runner: macos-14
            bundles: dmg
            artifact_slug: macos
            target: universal-apple-darwin

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        shell: bash
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            file \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS universal Rust targets
        if: runner.os == 'macOS'
        run: |
          rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Shorten Windows package cache paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm config set store-dir D:\pnpm-store
          "npm_config_cache=D:\npm-cache" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TEMP=D:\temp" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TMP=D:\temp" | Out-File -FilePath $env:GITHUB_ENV -Append
          New-Item -ItemType Directory -Force D:\pnpm-store,D:\npm-cache,D:\temp | Out-Null

      - name: Build desktop package with Tauri
        env:
          TAURI_BUNDLES: ${{ matrix.bundles }}
          TAURI_TARGET: ${{ matrix.target || '' }}
          CARGO_BUILD_JOBS: 1
        run: pnpm package:desktop
        working-directory: frontend

      - name: Collect Linux desktop artifacts
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          arch="${{ matrix.arch }}"
          bundle_dir="frontend/src-tauri/target/release/bundle"
          appimage="$(find "$bundle_dir" -name '*.AppImage' -type f | head -1 || true)"
          deb="$(find "$bundle_dir" -name '*.deb' -type f | head -1 || true)"
          rpm="$(find "$bundle_dir" -name '*.rpm' -type f | head -1 || true)"
          found=false
          if [ -n "$appimage" ]; then
            cp "$appimage" "release-assets/LambChat-${RELEASE_TAG}-Linux-${arch}.AppImage"
            found=true
          fi
          if [ -n "$deb" ]; then
            cp "$deb" "release-assets/LambChat-${RELEASE_TAG}-Linux-${arch}.deb"
            found=true
          fi
          if [ -n "$rpm" ]; then
            cp "$rpm" "release-assets/LambChat-${RELEASE_TAG}-Linux-${arch}.rpm"
            found=true
          fi
          if [ "$found" != true ]; then
            echo "No Linux desktop artifacts found"
            exit 1
          fi

      - name: Collect Windows desktop artifacts
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          $msi = Get-ChildItem -Path 'frontend/src-tauri/target/release/bundle' -Recurse -Include *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($null -eq $msi) {
            throw 'No Windows MSI installer found'
          }
          Copy-Item $msi.FullName "release-assets/LambChat-$env:RELEASE_TAG-Windows.msi"

          $exeCandidates = @(
            'frontend/src-tauri/target/release/lambchat.exe',
            'frontend/src-tauri/target/x86_64-pc-windows-msvc/release/lambchat.exe'
          )
          $exePath = $exeCandidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if ($null -eq $exePath) {
            throw 'No Windows portable exe found'
          }
          $portableDir = 'release-assets/LambChat-Portable'
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null
          Copy-Item $exePath $portableDir
          Set-Content -Path (Join-Path $portableDir 'portable.ini') -Value @(
            '# LambChat portable build marker',
            'portable=true'
          ) -Encoding UTF8
          Compress-Archive -Path "$portableDir/*" -DestinationPath "release-assets/LambChat-$env:RELEASE_TAG-Windows-Portable.zip" -Force
          Remove-Item -Recurse -Force $portableDir

      - name: Collect macOS desktop artifacts
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-assets
          app_path=""
          dmg_path=""
          for path in \
            "frontend/src-tauri/target/universal-apple-darwin/release/bundle/macos" \
            "frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/macos" \
            "frontend/src-tauri/target/x86_64-apple-darwin/release/bundle/macos" \
            "frontend/src-tauri/target/release/bundle/macos"; do
            if [ -d "$path" ]; then
              [ -z "$app_path" ] && app_path="$(find "$path" -maxdepth 1 -name '*.app' -type d | head -1 || true)"
            fi
          done
          for path in \
            "frontend/src-tauri/target/universal-apple-darwin/release/bundle/dmg" \
            "frontend/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg" \
            "frontend/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg" \
            "frontend/src-tauri/target/release/bundle/dmg"; do
            if [ -d "$path" ]; then
              [ -z "$dmg_path" ] && dmg_path="$(find "$path" -maxdepth 1 -name '*.dmg' -type f | head -1 || true)"
            fi
          done
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found"
            exit 1
          fi
          if [ -z "$dmg_path" ]; then
            echo "No macOS .dmg found"
            exit 1
          fi
          ditto -c -k --sequesterRsrc --keepParent "$app_path" "release-assets/LambChat-${RELEASE_TAG}-macOS.zip"
          cp "$dmg_path" "release-assets/LambChat-${RELEASE_TAG}-macOS.dmg"

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-${{ matrix.artifact_slug }}-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    outputs:
      has_artifact: ${{ steps.android-artifact.outputs.has_artifact }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build and sync mobile web assets
        run: pnpm mobile:sync
        working-directory: frontend

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Build Android APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease assembleDebug
        working-directory: frontend/android

      - name: Prepare Android APK artifact
        id: android-artifact
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p release-assets
          unsigned_apk="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            "$build_tools/apksigner" sign \
              --ks release.keystore \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "release-assets/LambChat-android-${RELEASE_TAG}-signed.apk" \
              "$unsigned_apk"
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          else
            debug_apk="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
            cp "$debug_apk" "release-assets/LambChat-android-${RELEASE_TAG}-debug.apk"
            echo "Android signing secrets are not configured; uploading debug APK instead of signed release APK."
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Android artifacts
        if: steps.android-artifact.outputs.has_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-android-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        shell: bash
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build and sync mobile web assets
        run: pnpm mobile:sync:ios
        working-directory: frontend

      - name: Install iOS pods
        run: pod install
        working-directory: frontend/ios/App

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Build iOS archive without signing
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/LambChat-ios.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/LambChatDerivedData" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
        working-directory: frontend/ios/App

      - name: Prepare iOS archive artifact
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/LambChat-ios.xcarchive" \
            "release-assets/LambChat-ios-${RELEASE_TAG}-unsigned-xcarchive.zip"

      - name: Upload iOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-ios-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - android
      - ios
    if: always()

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
        continue-on-error: true

      - name: Ensure release has useful installable artifacts
        run: |
          if [ ! -d release-assets ]; then
            echo "No release artifact directory was downloaded."
            exit 1
          fi
          find release-assets -type f -print
          test "$(find release-assets -type f | wc -l)" -gt 0

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: LambChat ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
