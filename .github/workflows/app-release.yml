name: App Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to create or update, for example v2.5.0-app. Ignored for tag pushes.'
        required: true
        type: string
      app_url:
        description: 'Public LambChat URL. Falls back to repo variable/secret LAMBCHAT_APP_URL.'
        required: false
        type: string

permissions:
  contents: write

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '10.32.1'
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  LAMBCHAT_APP_URL: ${{ inputs.app_url || vars.LAMBCHAT_APP_URL || secrets.LAMBCHAT_APP_URL }}

jobs:
  desktop:
    name: Desktop (${{ matrix.label }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux
            runner: ubuntu-latest
            bundles: deb
            artifact_slug: linux
          - label: Windows
            runner: windows-2022
            bundles: msi
            artifact_slug: windows
          - label: macOS
            runner: macos-latest
            bundles: dmg
            artifact_slug: macos

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        shell: bash
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Install Linux desktop dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Shorten Windows package cache paths
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pnpm config set store-dir D:\pnpm-store
          "npm_config_cache=D:\npm-cache" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TEMP=D:\temp" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TMP=D:\temp" | Out-File -FilePath $env:GITHUB_ENV -Append
          New-Item -ItemType Directory -Force D:\pnpm-store,D:\npm-cache,D:\temp | Out-Null

      - name: Build desktop package with Tauri
        env:
          TAURI_BUNDLES: ${{ matrix.bundles }}
          CARGO_BUILD_JOBS: 1
        run: pnpm package:desktop
        working-directory: frontend

      - name: Collect desktop artifacts
        shell: bash
        run: |
          mkdir -p release-assets
          find frontend/src-tauri/target/release/bundle -type f \
            \( -name '*.dmg' -o -name '*.msi' -o -name '*.deb' -o -name '*.AppImage' -o -name '*.rpm' \) \
            -print > release-assets/files.txt
          if [ ! -s release-assets/files.txt ]; then
            echo "No desktop artifacts found"
            exit 1
          fi
          while IFS= read -r file; do
            base="$(basename "$file")"
            cp "$file" "release-assets/LambChat-${{ matrix.artifact_slug }}-${RELEASE_TAG}-${base}"
          done < release-assets/files.txt
          rm release-assets/files.txt

      - name: Upload desktop artifacts
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-${{ matrix.artifact_slug }}-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-latest
    outputs:
      has_artifact: ${{ steps.android-artifact.outputs.has_artifact }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build and sync mobile web assets
        run: pnpm mobile:sync
        working-directory: frontend

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Build Android APKs
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease assembleDebug
        working-directory: frontend/android

      - name: Prepare Android APK artifact
        id: android-artifact
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p release-assets
          unsigned_apk="frontend/android/app/build/outputs/apk/release/app-release-unsigned.apk"
          if [ -n "$ANDROID_KEYSTORE_BASE64" ] && [ -n "$ANDROID_KEYSTORE_PASSWORD" ] && [ -n "$ANDROID_KEY_ALIAS" ] && [ -n "$ANDROID_KEY_PASSWORD" ]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > release.keystore
            build_tools="$(find "$ANDROID_HOME/build-tools" -mindepth 1 -maxdepth 1 -type d | sort -V | tail -n 1)"
            "$build_tools/apksigner" sign \
              --ks release.keystore \
              --ks-pass "pass:$ANDROID_KEYSTORE_PASSWORD" \
              --ks-key-alias "$ANDROID_KEY_ALIAS" \
              --key-pass "pass:$ANDROID_KEY_PASSWORD" \
              --out "release-assets/LambChat-android-${RELEASE_TAG}-signed.apk" \
              "$unsigned_apk"
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          else
            debug_apk="frontend/android/app/build/outputs/apk/debug/app-debug.apk"
            cp "$debug_apk" "release-assets/LambChat-android-${RELEASE_TAG}-debug.apk"
            echo "Android signing secrets are not configured; uploading debug APK instead of signed release APK."
            echo "has_artifact=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Android artifacts
        if: steps.android-artifact.outputs.has_artifact == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-android-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate app URL
        shell: bash
        run: |
          test -n "$LAMBCHAT_APP_URL"
          case "$LAMBCHAT_APP_URL" in
            https://*) ;;
            *) echo "LAMBCHAT_APP_URL must be an https:// URL"; exit 1 ;;
          esac

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Build and sync mobile web assets
        run: pnpm mobile:sync:ios
        working-directory: frontend

      - name: Install iOS pods
        run: pod install
        working-directory: frontend/ios/App

      - name: Verify LambChat native brand assets
        run: pnpm brand:assets:check
        working-directory: frontend

      - name: Build iOS archive without signing
        run: |
          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination generic/platform=iOS \
            -archivePath "$RUNNER_TEMP/LambChat-ios.xcarchive" \
            -derivedDataPath "$RUNNER_TEMP/LambChatDerivedData" \
            archive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
        working-directory: frontend/ios/App

      - name: Prepare iOS archive artifact
        run: |
          mkdir -p release-assets
          ditto -c -k --sequesterRsrc --keepParent \
            "$RUNNER_TEMP/LambChat-ios.xcarchive" \
            "release-assets/LambChat-ios-${RELEASE_TAG}-unsigned-xcarchive.zip"

      - name: Upload iOS archive artifact
        uses: actions/upload-artifact@v4
        with:
          name: LambChat-ios-${{ env.RELEASE_TAG }}
          path: release-assets/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - desktop
      - android
      - ios
    if: always()

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
        continue-on-error: true

      - name: Ensure release has useful installable artifacts
        run: |
          if [ ! -d release-assets ]; then
            echo "No release artifact directory was downloaded."
            exit 1
          fi
          find release-assets -type f -print
          test "$(find release-assets -type f | wc -l)" -gt 0

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: LambChat ${{ env.RELEASE_TAG }}
          files: release-assets/*
          fail_on_unmatched_files: true
          generate_release_notes: true
